<!doctype html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="utf-8">
  <title>القبطان موبايل ستور | أحدث الهواتف الذكية والإكسسوارات</title>
  <base href="/">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="description" content="متجر القبطان موبايل ستور - وجهتك الأولى لشراء أحدث الهواتف المحمولة والإكسسوارات الأصلية بأفضل الأسعار وأقوى العروض في مصر.">
  <meta name="keywords" content="القبطان, موبايل, ستور, هواتف, إكسسوارات, صيانة, شراء هواتف, عروض موبايلات, تقسيط, مصر">
  <link rel="icon" type="image/jpeg" href="assets/images/logo.jpg">
</head>
<body>
  <!-- شاشة التحميل تظهر فوراً خارج app-root لتجنب مشاكل الـ Hydration -->
  <div id="app-initial-loader" style="
    position: fixed;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    background: radial-gradient(circle at center, #1e293b 0%, #0f172a 100%);
    z-index: 9999;
    font-family: 'Cairo', 'Segoe UI', sans-serif;
  ">
    <div style="
      width: 80px;
      height: 80px;
      background: linear-gradient(135deg, #d97706 0%, #b45309 100%);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 2.5rem;
      margin-bottom: 24px;
      box-shadow: 0 0 40px rgba(217,119,6,0.4);
      animation: pulse-loader 1.5s ease-in-out infinite;
    ">⚓</div>
    <div style="
      width: 48px;
      height: 48px;
      border: 4px solid rgba(217,119,6,0.2);
      border-top-color: #d97706;
      border-radius: 50%;
      animation: spin-loader 0.8s linear infinite;
      margin-bottom: 16px;
    "></div>
    <p style="color: #94a3b8; font-size: 0.95rem; margin: 0;">جاري التحميل...</p>
  </div>

  <style>
    @keyframes spin-loader {
      to { transform: rotate(360deg); }
    }
    @keyframes pulse-loader {
      0%, 100% { transform: scale(1); box-shadow: 0 0 40px rgba(217,119,6,0.4); }
      50% { transform: scale(1.08); box-shadow: 0 0 60px rgba(217,119,6,0.6); }
    }
  </style>

  <app-root></app-root>
</body>
</html>
